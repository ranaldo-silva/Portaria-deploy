spring.application.name=Portaria

# Banco de dados — configurar via variáveis de ambiente no Railway/Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# RabbitMQ — configurar via variáveis de ambiente no Railway/Render
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=5671
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST}
spring.rabbitmq.ssl.enabled=true

# URL da própria aplicação (usada pelo EncomendaClient via Feign)
URL_APPLICATION=${URL_APPLICATION:http://localhost:8080}

# URL do serviço de ML
URL_ML=${URL_ML:http://localhost:8001}

# Firebase — JSON das credenciais como variável de ambiente
FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}

# Porta — Railway injeta a PORT automaticamente
server.port=${PORT:8080}
